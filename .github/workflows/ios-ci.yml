name: iOS CI/CD Pipeline
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup VNC
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw 123456 \
            -restart -agent -privs -all

          xcrun simctl boot "iPhone 16"
          open -a Simulator
          sleep 5

          ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:5900 tcp@a.pinggy.io > /tmp/pinggy.log 2>&1 &
          sleep 10

          echo "========================================="
          cat /tmp/pinggy.log | grep -o '[a-z]*-[0-9]*-[0-9]*-[0-9]*-[0-9]*-[0-9]*\.a\.free\.pinggy\.link:[0-9]*'
          echo "SIFRE: 123456"
          echo "========================================="
      - name: Keep Alive
        run: |
          for i in {1..20}; do
            echo "[$(date +'%H:%M:%S')] $i/20"
            sleep 240
          done
