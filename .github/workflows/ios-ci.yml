name: iOS CI/CD Pipeline
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup VNC
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw 123456 \
            -restart -agent -privs -all

          brew install x11vnc
          x11vnc -display :99 -passwd 123456 -rfbport 5901 -forever -bg -create
          sleep 3

          # pip ile websockify kur
          pip3 install websockify --break-system-packages

          # noVNC'yi pip'ten al
          pip3 install novnc --break-system-packages || true
          NOVNC_PATH=$(python3 -c "import novnc; import os; print(os.path.dirname(novnc.__file__))" 2>/dev/null || echo "")

          if [ -z "$NOVNC_PATH" ]; then
            # fallback: sadece websockify yeter
            websockify --web=/dev/null 6081 localhost:5901 &
          else
            websockify --web=$NOVNC_PATH 6081 localhost:5901 &
          fi
          sleep 3

          ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:6081 tcp@a.pinggy.io > /tmp/pinggy.log 2>&1 &
          sleep 8

          echo "========================================="
          URL=$(cat /tmp/pinggy.log | grep -o 'tcp://[^ ]*' | head -1 | sed 's/tcp:/http:/')
          echo "TARAYICIDA AC: ${URL}/vnc.html"
          echo "SIFRE: 123456"
          echo "========================================="
      - name: Keep Alive
        run: |
          for i in {1..20}; do
            echo "[$(date +'%H:%M:%S')] $i/20"
            sleep 240
          done
