name: iOS CI/CD Pipeline
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup VNC
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw 123456 \
            -restart -agent -privs -all

          brew install x11vnc
          x11vnc -display :99 -passwd 123456 -rfbport 5901 -forever -bg -create

          curl -sL https://github.com/novnc/noVNC/archive/refs/heads/master.zip -o /tmp/novnc.zip
          curl -sL https://github.com/novnc/websockify/archive/refs/heads/master.zip -o /tmp/ws.zip
          unzip -q /tmp/novnc.zip -d /tmp/
          unzip -q /tmp/ws.zip -d /tmp/
          mv /tmp/noVNC-master /tmp/novnc
          mv /tmp/websockify-master /tmp/novnc/utils/websockify

          nohup /tmp/novnc/utils/novnc_proxy --vnc localhost:5901 --listen 6081 > /tmp/novnc.log 2>&1 &
          sleep 5

          # Direkt public URL aç
          ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:6081 tcp@a.pinggy.io > /tmp/pinggy.log 2>&1 &
          sleep 8

          echo "========================================="
          echo "TARAYICIDE AC:"
          cat /tmp/pinggy.log | grep -o 'tcp://[^ ]*' | head -1 | sed 's/tcp:/http:/'
          echo "/vnc.html ekle sonuna"
          echo "SIFRE: 123456"
          echo "========================================="
      - name: Keep Alive
        run: |
          for i in {1..20}; do
            echo "[$(date +'%H:%M:%S')] $i/20"
            sleep 240
          done
