name: iOS CI/CD Pipeline
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw 123456 \
            -restart -agent -privs -all

          # noVNC ve websockify GitHub'dan kur
          git clone https://github.com/novnc/noVNC.git /tmp/novnc
          git clone https://github.com/novnc/websockify.git /tmp/novnc/utils/websockify

          # Simülatörü başlat
          xcrun simctl boot "iPhone 16"
          open -a Simulator
          sleep 5

          # noVNC başlat
          /tmp/novnc/utils/novnc_proxy --vnc localhost:5900 --listen 6080 &
          sleep 3

          # tmate ile tünel
          brew install tmate
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          echo "========================================="
          echo "SSH:"
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          echo "========================================="
      - name: Keep Alive
        run: |
          for i in {1..15}; do
            echo "[$(date +'%H:%M:%S')] $i/15"
            sleep 240
          done
